worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=images:10m
        max_size=1g
        inactive=7d
        use_temp_path=off;

    server {
        listen 80;

        location / {
            proxy_pass http://manael:8080;

            proxy_cache images;
            proxy_cache_valid 200 7d;
            proxy_cache_valid any 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_lock on;

            # Extract only the necessary parameters to build the cache key,
            # preventing cache misses caused by query ordering or extra parameters.
            proxy_cache_key "$scheme$proxy_host$uri?w=$arg_w&h=$arg_h&q=$arg_q&fit=$arg_fit";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            add_header X-Cache-Status $upstream_cache_status;
        }
    }
}
